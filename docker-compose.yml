services:
  gateway:
    build: .
    ports:
      - "8091:8091"
    environment:
      PORT: 8091
      RECIPIENT_ADDRESS: ${RECIPIENT_ADDRESS}
      NETWORK: ${NETWORK:-base-sepolia}
      FACILITATOR_URL: ${FACILITATOR_URL:-https://facilitator.x402.rs}
      GATEWAY_CONFIG: ./config/routes.yaml
    volumes:
      - ./config:/app/config:ro
